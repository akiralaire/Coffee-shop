<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chekitalriel brewEd shop</title>
<style>
/* Full-screen coffee shop background */
body {
  margin: 0;
  font-family: Georgia, serif;
  color: #3b2f2f;
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1511920170033-f8396924c348?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
  background-size: cover;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* Overlay for vintage look */
body::before {
  content:"";
  position: fixed;
  inset: 0;
  background: rgba(246, 241, 234, 0.85);
  z-index: -1;
}

/* Shop name */
h1 {
  font-size: 48px;
  margin: 0;
  text-align: center;
  text-shadow: 2px 2px 5px #d6c9b8;
}

/* Welcome text */
p {
  font-size: 20px;
  margin: 10px 0 30px 0;
  text-align: center;
}

/* Button to dashboard */
a.button {
  text-decoration: none;
  background-color: #7a4e2d;
  color: white;
  padding: 14px 28px;
  border-radius: 8px;
  font-size: 18px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: 0.3s;
}
a.button:hover {
  background-color: #5a3720;
  transform: translateY(-2px);
}
</style>
</head>

<body>
<h1>Chekitalriel brewEd shop</h1>
<p>Welcome to your favorite cozy coffee place ☕</p>
<a href="dashboard.html" class="button">Go to Menu</a>
</body>
</html>
